{% extends 'blog/asosiy.html' %}

{% block kontent %}
<div class="password-change-container">
    <h2>🔒 Parolni o'zgartirish</h2>
    
    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <form method="post" class="password-change-form">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn-submit">Parolni O'zgartirish</button>
    </form>
</div>
{% endblock %}
