<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Shahodat Blog{% endblock %}</title>

    <style>

/* ===== BODY ===== */
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #fcefee, #f5e6e8, #e8d5d7);
    color: #5a4a4a;
}

/* ===== NAVBAR ===== */
nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    background: rgba(255, 255, 255, 0.4);
    backdrop-filter: blur(10px);
}

/* ===== TITLE ===== */
.title {
    text-align: center;
    font-size: 40px;
    margin-bottom: 10px;
    color: #a86c6c;
}

.subtitle {
    text-align: center;
    color: #8c6f6f;
    margin-bottom: 50px;
}

/* ===== GRID ===== */
.projects {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 35px;
}

/* ===== CARD ===== */
.project-card {
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.project-card:hover {
    transform: translateY(-8px);
}

/* ===== TEXT ===== */
.project-card h3 {
    margin-bottom: 10px;
    color: #7a5c5c;
}

.project-card p {
    margin-bottom: 10px;
    color: #6b5b5b;
}

.tech {
    font-size: 14px;
    opacity: 0.7;
}

/* ===== BUTTON ===== */
.buttons {
    margin-top: 15px;
    display: flex;
    gap: 10px;
}

.btn {
    padding: 10px 18px;
    border-radius: 12px;
    background: linear-gradient(135deg, #f8c8c8, #e8aeb1);
    color: #5a4a4a;
    text-decoration: none;
    font-weight: 500;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    background: linear-gradient(135deg, #e8aeb1, #d89ca0);
}

/* ===== OUTLINE ===== */
.outline {
    background: transparent;
    border: 1px solid #e8aeb1;
}

.outline:hover {
    background: #e8aeb1;
    color: white;
}

</style>
</head>
<body>

    <!-- Navbar -->
    <nav>
        <h2>Shahodat Blogi</h2>
        <ul>
            <li><a href="/">Bosh sahifa</a></li>
            <li><a href="/xizmatlar/">Xizmatlar</a></li>
            <li><a href="/narxlar/">Narxlar</a></li>
            <li><a href="/fikrlar/">Fikrlar</a></li>
            <li><a href="/faq/">FAQ</a></li>
            <li><a href="/contact/">Kontakt</a></li>
            <li><a href="/kitoblar/">Kitoblar</a></li>
        </ul>
    </nav>

    <!-- Content -->
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>&copy; 2024 Mening Blogim. Barcha huquqlar himoyalangan.</p>
        <p>Django bilan ishlab chiqilgan 💚</p>
    </div>

</body>
</html>
