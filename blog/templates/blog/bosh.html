

{% extends 'blog/asosiy.html' %}

{% block kontent %}
    <h2>📝 So'nggi Postlar</h2>

    {% for post in postlar %}
    <div class="post-card">
        <h3>{{ post.sarlavha }}</h3>
        <p class="post-meta">
            👤 {{ post.muallif }} | 📅 {{ post.yaratilgan_sana|date:"d-M-Y" }}
        </p>
        <p>{{ post.matn|truncatewords:30 }}</p>
        <a href="{% url 'post_batafsil' post.id %}" class="btn">
            Batafsil o'qish →
        </a>
        
    </div>
{% endfor %}
{% endblock %}
